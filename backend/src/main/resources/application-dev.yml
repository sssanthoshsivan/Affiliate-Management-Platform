spring:
  datasource:
    url: jdbc:h2:mem:runloyal;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  
  h2:
    console:
      enabled: true
      path: /h2-console

  # Disable Redis cache for dev profile
  cache:
    type: none
  
  data:
    redis:
      repositories:
        enabled: false

logging:
  level:
    com.runloyal: DEBUG
    org.springframework.cache: DEBUG
