version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: runloyal-postgres
    environment:
      POSTGRES_DB: runloyal
      POSTGRES_USER: runloyal
      POSTGRES_PASSWORD: runloyal123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runloyal -d runloyal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - runloyal-network

  redis:
    image: redis:7-alpine
    container_name: runloyal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - runloyal-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: runloyal-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/runloyal
      SPRING_DATASOURCE_USERNAME: runloyal
      SPRING_DATASOURCE_PASSWORD: runloyal123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - runloyal-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: runloyal-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - runloyal-network

volumes:
  postgres_data:
  redis_data:

networks:
  runloyal-network:
    driver: bridge
