server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Angular app — all unknown paths serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API (REST calls from Angular) ───────────────────────────────
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  4200;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_cache_bypass                 $http_upgrade;

        # Rewrite any backend redirect that leaks port 8080 back to port 4200
        proxy_redirect ~^http://[^/]+:8080/(.*)$  http://$host:4200/$1;
        proxy_redirect ~^http://backend/(.*)$      http://$host:4200/$1;
    }

    # ── Affiliate short-link resolver  /r/{shortCode} ───────────────────────
    # The backend resolves Redis cache and issues a redirect to /track?...
    location /r/ {
        proxy_pass http://backend:8080/r/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  4200;

        # Rewrite backend's Location header so the browser stays on port 4200
        proxy_redirect ~^http://[^/]+:8080/(.*)$  http://$host:4200/$1;
        proxy_redirect ~^http://backend/(.*)$      http://$host:4200/$1;
    }

    # ── Click tracker  /track?... ────────────────────────────────────────────
    # Records click to Redis, then redirects to /product/{id}?...
    location /track {
        proxy_pass http://backend:8080/track;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  4200;

        # Rewrite backend's Location header so the browser stays on port 4200
        proxy_redirect ~^http://[^/]+:8080/(.*)$  http://$host:4200/$1;
        proxy_redirect ~^http://backend/(.*)$      http://$host:4200/$1;
    }

    # Error pages → serve Angular so the router can handle 404s gracefully
    error_page 404 /index.html;

    # Static asset cache
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
