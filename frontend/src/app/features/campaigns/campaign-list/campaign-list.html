<div class="page-header">
  <div class="header-text">
    <h1>Campaigns</h1>
    <p class="subtitle">Marketing initiatives and promotional events</p>
  </div>
  <button mat-raised-button color="primary" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    New Campaign
  </button>
</div>

<mat-card class="table-card glass-card">
  <mat-card-content>
    <table mat-table [dataSource]="campaigns" *ngIf="!loading">
      
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef> Description </th>
        <td mat-cell *matCellDef="let element"> {{element.description || 'No description'}} </td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef> Created </th>
        <td mat-cell *matCellDef="let element"> {{element.createdAt | date:'mediumDate'}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="accent">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div class="loading-shade" *ngIf="loading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div class="no-data" *ngIf="!loading && campaigns.length === 0">
      <mat-icon>campaign</mat-icon>
      <p>No campaigns active.</p>
    </div>
  </mat-card-content>
</mat-card>
