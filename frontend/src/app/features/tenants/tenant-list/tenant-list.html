<div class="page-header">
  <div class="header-text">
    <h1>Tenants</h1>
    <p class="subtitle">Platform instances and client management</p>
  </div>
  <button mat-raised-button color="primary" (click)="openCreateDialog()">
    <mat-icon>domain_add</mat-icon>
    New Tenant
  </button>
</div>

<mat-card class="table-card glass-card">
  <mat-card-content>
    <table mat-table [dataSource]="tenants" *ngIf="!loading">
      
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <ng-container matColumnDef="domain">
        <th mat-header-cell *matHeaderCellDef> Domain </th>
        <td mat-cell *matCellDef="let element"> {{element.domain}} </td>
      </ng-container>

      <ng-container matColumnDef="commissionRate">
        <th mat-header-cell *matHeaderCellDef> Commission </th>
        <td mat-cell *matCellDef="let element"> {{element.commissionRate}}% </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element">
          <span class="status-chip" [ngClass]="element.status?.toLowerCase()">
            {{element.status}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="openEditDialog(element)" matTooltip="Edit Tenant">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteTenant(element.id)" matTooltip="Delete Tenant">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div class="loading-shade" *ngIf="loading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div class="no-data" *ngIf="!loading && tenants.length === 0">
      <mat-icon>business</mat-icon>
      <p>No tenants registered.</p>
    </div>
  </mat-card-content>
</mat-card>
